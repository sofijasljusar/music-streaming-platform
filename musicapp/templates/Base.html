{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Songs</title>

    <link rel="stylesheet" href="{% static '/musicapp/сss/Heder2R.css' %}">
    <link rel="stylesheet" href="{% static '/musicapp/сss/Sidebar.css' %}">
    <link rel="stylesheet" href="{% static '/musicapp/сss/Footer.css' %}">
    <link rel="stylesheet" href="{% static '/musicapp/сss/BottomPlayer.css' %}">
    <link rel="stylesheet" href="{% static '/musicapp/сss/Links.css' %}">

    {% block extra_css %}{% endblock extra_css%}
</head>

<body>

<!-- Header -->
{% include 'Header.html' %}

<!-- Sidebar -->
{% include 'Sidebar.html' %}

    {%  block content %}
        <!-- Content goes here -->
    {%  endblock content %}

<!-- Player Controls -->
{% include 'BottomPlayer.html' %}

<!-- Footer -->
{% include 'Footer.html' %}



<!-- Common JavaScript included here -->
<script src="{% static '/musicapp/js/sidebar.js' %}"></script>
<script src="{% static '/musicapp/js/player.js' %}"></script>
<script>
    // JavaScript for handling heart icon click
    document.querySelectorAll('.heart-button').forEach(button => {
        button.addEventListener('click', function() {
            const songId = this.getAttribute('data-song-id');
            const heartIcon = this.querySelector('.heart-icon');

            const heartFilled = `
            <svg class="heart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="#e600ff">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                         2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09
                         C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                         c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            `;

            const heartEmpty = `
            <svg class="heart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#e600ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                         2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09
                         C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                         c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            `;

            // Send AJAX request to add song to 'My favorites' playlist
            fetch(`/add_to_favorites/${songId}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}',  // Include CSRF token for security
                },
                body: JSON.stringify({
                    song_id: songId,
                }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'added') {
                    heartIcon.innerHTML = heartFilled;
                } else if (data.status === 'removed') {
                    heartIcon.innerHTML = heartEmpty;
                }
            })
            .catch(error => console.error('Error adding to favorites:', error));
        });
    });
</script>
{% block extra_scripts %}{% endblock extra_scripts%}
</body>
</html>
